version: "3.9"

services:
  web:
    build: .
    expose:
      - "3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app:delegated
      - /app/node_modules
    command: npm run dev

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
